agents:
  claude:
    home: "~/.claude"
    # subpaths of home denied even to this agent itself (transcripts, credentials,
    # history); the rest of home — notably projects/<proj>/memory — stays readable
    sensitive_subpaths:
      - ".env"
      - ".credentials.json"
      - "history.jsonl"
      - "projects/**/*.jsonl"
      - "shell-snapshots"
      - "todos"
    extras:
      readable_paths:
        - "~/.claude/plugins"
      allowed_read_patterns:
        - "/private/tmp/claude-{uid}/**"
        - "/tmp/claude-{uid}/**"
      writable_paths:
        - "~/.claude/plugins/data"
        - "~/.claude/projects"
      allowed_domains:
        - "*.anthropic.com"
        - "code.claude.com"
    plugins:
      "frontend-design@claude-plugins-official": true
      "gopls-lsp@claude-plugins-official": true
      "typescript-lsp@claude-plugins-official": true
      "pyright-lsp@claude-plugins-official": true
      "lua-lsp@claude-plugins-official": true
    marketplaces: {}
  codex:
    home: "~/.codex"
    sensitive_subpaths:
      - "auth.json"
      - "history.jsonl"
      - "sessions"
      - "log"
    extras:
      allowed_domains:
        - "*.openai.com"
        - "*.chatgpt.com"
# shared subagent definitions rendered for every harness; bodies live in
# .chezmoitemplates/subagents/<name>.md, tier resolves via subagent_tiers
subagents:
  go-reviewer:
    tier: mid
    readonly: true
    tools: "Read, Grep, Glob, Bash"
    description: "Review Go code diffs for correctness and idiomatic style. Use when you want a focused review of Go changes before merging."
  python-reviewer:
    tier: mid
    readonly: true
    tools: "Read, Grep, Glob, Bash"
    description: "Review Python diffs for correctness, type safety, and idiomatic style. Use when you want a focused review of Python changes before merging."
  ts-reviewer:
    tier: mid
    readonly: true
    tools: "Read, Grep, Glob, Bash"
    description: "Review TypeScript/Node.js diffs for type safety, async correctness, and idiomatic patterns. Use when you want a focused review of TS/JS changes."
  shell-reviewer:
    tier: small
    readonly: true
    tools: "Read, Grep, Glob, Bash"
    description: "Review shell scripts, zsh configs, and chezmoi templates for correctness and safety. Use for shell/dotfile diffs."
  log-triager:
    tier: small
    readonly: true
    tools: "Read, Grep, Bash"
    description: "Summarize large log files or stderr dumps into a short diagnosis. Use to avoid pasting giant logs into the main context."
  migration-planner:
    tier: top
    readonly: true
    tools: "Read, Grep, Glob, Bash"
    description: "Plan complex migrations — schema changes, breaking API changes, major dependency upgrades — with an ADR-style analysis. Use when a change needs a proper plan before any code is written."
subagent_tiers:
  claude:
    small: haiku
    mid: sonnet
    top: opus
  codex:
    small: gpt-5.6-luna
    mid: gpt-5.6-terra
    top: gpt-5.6-sol
agent_sandbox:
  filesystem:
    paths:
      ".env": none
      "~/.ssh": none
      "~/.gnupg": none
      "~/.vault-token": none
      "~/.azure": none
      "~/.kube": none
      "~/.docker": none
      "~/.mc": none
      "~/.talos": none
      "~/.config/1Password": none
      "~/.config/op": none
      "~/.config/gcloud": none
      "~/.config/opentofu": none
      "~/.config/configstore": none
      "~/.local/share/uv/credentials": none
      "~/.claude.json": none
      "~/.zsh_history": none
      "~/.zhistory": none
      "~/.go/bin": read
      "~/.go/pkg/mod": write
      "~/.npm/_cacache": write
      "~/.npm/_logs": write
      "~/.cache/uv": write
    # per-OS paths merged on the matching .chezmoi.os (override base modes); others skipped
    os_paths:
      darwin:
        "/opt/homebrew": read
      linux: {}
    resolved_paths:
      # path resolved at chezmoi render time; skipped if `requires` binary absent
      - mode: write
        requires: go
        command: "go env GOCACHE"
  network:
    allow_local_binding: true
    allowed_domains:
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      - registry.npmjs.org
      - "*.npmjs.org"
      - pypi.org
      - files.pythonhosted.org
      - proxy.golang.org
      - sum.golang.org
      - pkg.go.dev
      - developer.mozilla.org
      - stackoverflow.com
      - "*.stackexchange.com"
      - nodejs.org
      - context7.com
      - "*.context7.com"
agent_mcp_servers:
  context7:
    package_bin: context7-mcp
    args: []
    env:
      CONTEXT7_API_KEY:
        op: Personal/Context7/api key
