agent_sandbox:
  filesystem:
    paths:
      "~/.ssh": none
      "~/.gnupg": none
      "~/.vault-token": none
      "~/.azure": none
      "~/.kube": none
      "~/.docker": none
      "~/.mc": none
      "~/.talos": none
      "~/.config/1Password": none
      "~/.config/op": none
      "~/.config/gcloud": none
      "~/.config/opentofu": none
      "~/.config/configstore": none
      "~/.local/share/uv/credentials": none
      "~/.claude": none
      "~/.claude/plugins": read
      "~/.claude/plugins/data": write
      "~/.claude.json": none
      "~/.codex": write
      "~/.zsh_history": none
      "~/.zhistory": none
      "~/.npm/_cacache": write
      "~/.npm/_logs": write
      "~/.cache/uv": write
  network:
    allowed_domains:
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      - registry.npmjs.org
      - "*.npmjs.org"
      - pypi.org
      - files.pythonhosted.org
      - proxy.golang.org
      - sum.golang.org
      - pkg.go.dev
      - "*.anthropic.com"
      - code.claude.com
      - developers.openai.com
      - developer.mozilla.org
      - stackoverflow.com
      - "*.stackexchange.com"
      - nodejs.org
      - chatgpt.com
agent_mcp_servers:
  context7:
    package_bin: context7-mcp
    args: []
    env:
      CONTEXT7_API_KEY:
        op: Personal/Context7/api key
