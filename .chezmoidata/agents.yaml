agents:
  claude:
    home: "~/.claude"
    extras:
      readable_paths:
        - "~/.claude/plugins"
      allowed_read_patterns:
        - "/private/tmp/claude-{uid}/**"
        - "/tmp/claude-{uid}/**"
      writable_paths:
        - "~/.claude/plugins/data"
        - "~/.claude/projects"
      allowed_domains:
        - "*.anthropic.com"
        - "code.claude.com"
    plugins:
      "frontend-design@claude-plugins-official": true
      "gopls-lsp@claude-plugins-official": true
      "typescript-lsp@claude-plugins-official": true
      "pyright-lsp@claude-plugins-official": true
      "lua-lsp@claude-plugins-official": true
    marketplaces: {}
agent_sandbox:
  filesystem:
    paths:
      ".env": none
      "~/.ssh": none
      "~/.gnupg": none
      "~/.vault-token": none
      "~/.azure": none
      "~/.kube": none
      "~/.docker": none
      "~/.mc": none
      "~/.talos": none
      "~/.config/1Password": none
      "~/.config/op": none
      "~/.config/gcloud": none
      "~/.config/opentofu": none
      "~/.config/configstore": none
      "~/.local/share/uv/credentials": none
      "~/.claude.json": none
      "~/.zsh_history": none
      "~/.zhistory": none
      "/opt/homebrew": read
      "~/.go/bin": read
      "~/.npm/_cacache": write
      "~/.npm/_logs": write
      "~/.cache/uv": write
  network:
    allowed_domains:
      - github.com
      - "*.github.com"
      - "*.githubusercontent.com"
      - registry.npmjs.org
      - "*.npmjs.org"
      - pypi.org
      - files.pythonhosted.org
      - proxy.golang.org
      - sum.golang.org
      - pkg.go.dev
      - developer.mozilla.org
      - stackoverflow.com
      - "*.stackexchange.com"
      - nodejs.org
      - context7.com
      - "*.context7.com"
agent_mcp_servers:
  context7:
    package_bin: context7-mcp
    args: []
    env:
      CONTEXT7_API_KEY:
        op: Personal/Context7/api key
